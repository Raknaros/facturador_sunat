version: '3.9'

services:

  # ─────────────────────────────────────────────
  # API Spring Boot
  # Requiere una BD PostgreSQL central accesible
  # con el schema "facturador" creado (Flyway lo
  # crea automáticamente al primer arranque).
  # ─────────────────────────────────────────────
  facturador-api:
    build: .
    container_name: facturador_api
    restart: unless-stopped
    environment:
      # Base de datos central (apunta a tu servidor PostgreSQL externo)
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST}:${DB_PORT:-5432}/${DB_NAME}?currentSchema=facturador
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      # Seguridad
      JWT_SECRET: ${JWT_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      # SUNAT: "beta" o "prod"
      SUNAT_MODO: ${SUNAT_MODO:-beta}
    ports:
      - "8080:8080"
