spring:
  application:
    name: facturador-sunat

  datasource:
    url: jdbc:postgresql://localhost:5432/db_facturador_api
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: org.postgresql.Driver
    hikari:
      pool-name: HikariInternal
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  h2.console.enabled: false

sunat:
  modo: beta
  endpoints:
    factura-beta: https://e-beta.sunat.gob.pe/ol-ti-itcpfegem-beta/billService
    factura-prod: https://e-factura.sunat.gob.pe/ol-ti-itcpfegem/billService
    resumen-beta: https://e-beta.sunat.gob.pe/ol-ti-itemision-otroscpe-gem-beta/billService
    resumen-prod: https://e-factura.sunat.gob.pe/ol-ti-itemision-otroscpe-gem/billService
    gre-auth-beta: https://gre-test.nubefact.com/v1/clientessol
    gre-auth-prod: https://api-seguridad.sunat.gob.pe/v1/clientessol
    gre-api-beta:  https://gre-test.nubefact.com/v1
    gre-api-prod:  https://api.sunat.gob.pe/v1
    consulta-prod: https://e-factura.sunat.gob.pe/ol-it-wsconscpegem/billConsultService

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 28800000

encryption:
  secret-key: ${ENCRYPTION_KEY}

springdoc:
  api-docs.path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method

---
spring:
  config.activate.on-profile: dev
  datasource:
    url: jdbc:h2:mem:facturador;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa.hibernate.ddl-auto: create-drop
  h2.console.enabled: true

sunat.modo: beta
